<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b0b12"/>
      <stop offset="100%" stop-color="#141420"/>
    </linearGradient>
  </defs>
  <style>
    .bg { fill: #141420; }
    .ring { fill: none; stroke: #e11937; stroke-width: 2; }
    .letter { fill: #e11937; font-family: system-ui, -apple-system, sans-serif; font-weight: 800; font-size: 34; }
    @media (prefers-color-scheme: light) {
      .bg { fill: #f5f5f7; }
      .ring { stroke: #e11937; }
      .letter { fill: #e11937; }
    }
  </style>
  <!-- Círculo de fundo -->
  <circle class="bg" cx="32" cy="32" r="32"/>
  <!-- Anel circular -->
  <circle class="ring" cx="32" cy="32" r="28"/>
  <!-- Letra "O" do OráculoAI -->
  <text class="letter" x="32" y="42" text-anchor="middle">O</text>
</svg>
